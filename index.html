<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Snake 8-bit</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0f0f17;
    color: #e5e7eb;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 16px;
    color: #8bd17c;
    text-shadow: 3px 3px 0 #000;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    width: 520px;
    font-size: 10px;
    margin-bottom: 10px;
    color: #9ca3af;
  }
  #hud span b { color: #f7d358; }
  canvas {
    background: #1a1a24;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 4px solid #2a2a3a;
    box-shadow: 0 0 0 2px #0f0f17, 0 0 24px rgba(139, 209, 124, 0.25);
  }
  canvas#game {
    max-width: min(100%, 624px);
    height: auto;
    touch-action: none;
  }
  #legend {
    grid-column: 3;
    justify-self: end;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 9px;
    color: #9ca3af;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .legend-sprite {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #1a1a24;
    border: 2px solid #2a2a3a;
  }
  .danger-x {
    color: #F83800;
    font-size: 16px;
    font-weight: bold;
    line-height: 1;
  }
  #controls {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    width: 100%;
    max-width: 520px;
    margin-top: 14px;
    gap: 16px;
    font-size: 8px;
    color: #6b7280;
    box-sizing: border-box;
  }
  #kbd-info {
    grid-column: 1;
    justify-self: start;
    line-height: 1.6;
  }
  #kbd-info summary {
    list-style: none;
    color: #9ca3af;
    cursor: pointer;
    user-select: none;
    padding: 2px 0;
  }
  #kbd-info summary::-webkit-details-marker { display: none; }
  #kbd-info summary::before {
    content: '▸ ';
    display: inline-block;
    transition: transform 0.15s;
  }
  #kbd-info[open] summary::before {
    transform: rotate(90deg);
  }
  #kbd-info .kbd-body {
    margin-top: 4px;
    line-height: 1.8;
  }
  #kbd-info .kbd-body > div {
    white-space: nowrap;
  }
  #dpad {
    grid-column: 2;
    display: grid;
    grid-template-columns: repeat(3, 36px);
    grid-template-rows: repeat(3, 36px);
    gap: 2px;
  }
  .dpad-btn {
    background: #2a2a3a;
    color: #e5e7eb;
    border: 2px solid #3a3a4a;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1;
    font-family: inherit;
    cursor: pointer;
    user-select: none;
    touch-action: manipulation;
    padding: 0;
  }
  .dpad-btn:active {
    background: #3a3a4a;
    transform: scale(0.94);
  }
  .dpad-btn[data-dir="up"]    { grid-column: 2; grid-row: 1; }
  .dpad-btn[data-dir="left"]  { grid-column: 1; grid-row: 2; }
  .dpad-btn[data-dir="right"] { grid-column: 3; grid-row: 2; }
  .dpad-btn[data-dir="down"]  { grid-column: 2; grid-row: 3; }
  kbd {
    background: #2a2a3a;
    border-radius: 3px;
    padding: 1px 6px;
    font-family: inherit;
    color: #e5e7eb;
  }
  @media (max-width: 640px) {
    body { padding: 8px; box-sizing: border-box; }
    h1 { font-size: 16px; margin: 0 0 10px; }
    #hud { width: 100%; max-width: 520px; margin-bottom: 8px; }
    canvas#game {
      width: 100%;
      max-width: min(100vw - 16px, 100vh - 200px);
    }
    #controls {
      max-width: 100%;
      gap: 10px;
      font-size: 7px;
    }
    #dpad {
      grid-template-columns: repeat(3, 32px);
      grid-template-rows: repeat(3, 32px);
    }
    #legend { font-size: 8px; gap: 4px; }
    .legend-sprite { width: 22px; height: 22px; }
    #kbd-info { font-size: 9px; }
  }
</style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="hud">
    <span>SCORE <b id="score">0</b></span>
    <span>LEVEL <b id="level">1</b></span>
    <span>BEST <b id="best">0</b></span>
  </div>
  <canvas id="game" width="624" height="624"></canvas>
  <div id="controls">
    <details id="kbd-info">
      <summary>Keyboard</summary>
      <div class="kbd-body">
        <div>Move <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd></div>
        <div>or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd></div>
        <div>Pause <kbd>Space</kbd></div>
        <div>Restart <kbd>R</kbd></div>
      </div>
    </details>
    <div id="dpad" role="group" aria-label="Directional pad">
      <button class="dpad-btn" data-dir="up" aria-label="Up">▲</button>
      <button class="dpad-btn" data-dir="left" aria-label="Left">◀</button>
      <button class="dpad-btn" data-dir="right" aria-label="Right">▶</button>
      <button class="dpad-btn" data-dir="down" aria-label="Down">▼</button>
    </div>
    <div id="legend">
      <div class="legend-item">
        <canvas class="legend-sprite" id="legend-rat" width="26" height="26"></canvas>
        <span><b id="rat-pts"></b>pt</span>
      </div>
      <div class="legend-item">
        <canvas class="legend-sprite" id="legend-egg" width="26" height="26"></canvas>
        <span><b id="egg-pts"></b>pt</span>
      </div>
      <div class="legend-item">
        <canvas class="legend-sprite" id="legend-pineapple" width="26" height="26"></canvas>
        <span class="danger-x">&times;</span>
      </div>
    </div>
  </div>

<script src="game.js"></script>
</body>
</html>
